<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Virtual Harpsichord</title>
  <style>
    :root {
      --panel: #3a2416;
      --gold: #b88a3b;
      --text: #f6efe6;
      --white-key-width: 64px;
      --white-key-height: 260px;
      --black-key-width: 40px;
      --black-key-height: 155px;
    }
    body {
      margin: 0;
      background: linear-gradient(180deg, #120c08, #2a1a11 60%, #120c08);
      color: var(--text);
      font-family: system-ui, sans-serif;
    }
    .wrap { padding: 16px; }
    .title { text-align: center; font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
    .subtitle { text-align: center; opacity: 0.85; margin-bottom: 14px; font-size: 0.95rem; }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 14px; }
    button, select {
      background: var(--panel);
      color: var(--text);
      border: 1px solid #6e4a27;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
    }
    .scroll-hint { text-align: center; margin: 10px 0; color: #e3cda8; font-size: 0.9rem; }
    .keyboard-shell {
      overflow-x: auto;
      padding: 16px;
      background: linear-gradient(180deg, #5a351c, #2f1d12);
      border-top: 6px solid var(--gold);
      border-bottom: 6px solid var(--gold);
      box-shadow: inset 0 0 30px rgba(0,0,0,0.35);
      border-radius: 18px;
    }
    .keyboard { position: relative; display: flex; width: max-content; user-select: none; touch-action: pan-x; }
    .white-key {
      position: relative; width: var(--white-key-width); height: var(--white-key-height);
      background: linear-gradient(180deg, #fffaf2, #e8dcc9); border: 1px solid #a68a68; border-bottom: 10px solid #b59461;
      border-radius: 0 0 10px 10px; box-sizing: border-box; display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 12px; color: #51361d; font-size: 0.8rem;
    }
    .white-key.active { background: linear-gradient(180deg, #f5deb4, #dfc18d); transform: translateY(2px); }
    .black-key {
      position: absolute; width: var(--black-key-width); height: var(--black-key-height);
      background: linear-gradient(180deg, #4f4035, #1f1714); border: 1px solid #130d0b; border-radius: 0 0 8px 8px; z-index: 5;
      display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; box-sizing: border-box; color: #f0e4d3; font-size: 0.7rem;
    }
    .black-key.active { background: linear-gradient(180deg, #8b6a43, #3a281d); transform: translateY(2px); }
    .legend { text-align: center; margin-top: 14px; opacity: 0.85; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">Virtual Harpsichord</div>
    <div class="subtitle">Bright, plucked baroque-style keyboard MVP</div>
    <div class="controls">
      <button id="unlockBtn">Enable Audio</button>
      <label>Registration
        <select id="registration">
          <option value="single">Single 8'</option>
          <option value="double">Double 8'</option>
          <option value="bright">Bright / nasal</option>
        </select>
      </label>
    </div>
    <div class="scroll-hint">⟷ Slide to scroll ⟷</div>
    <div class="keyboard-shell"><div id="keyboard" class="keyboard"></div></div>
    <div class="legend">Tap keys to play. This MVP uses synthesized plucked sound, not samples yet.</div>
  </div>
  <script>
    const WHITE_ORDER = ['C','D','E','F','G','A','B'];
    const BLACK_AFTER = { C:'C#', D:'D#', F:'F#', G:'G#', A:'A#' };
    const SEMITONES = { C:0,'C#':1,D:2,'D#':3,E:4,F:5,'F#':6,G:7,'G#':8,A:9,'A#':10,B:11 };
    let audioCtx = null;
    const keyboard = document.getElementById('keyboard');
    const unlockBtn = document.getElementById('unlockBtn');
    const registrationEl = document.getElementById('registration');
    function noteToFrequency(note) {
      const match = note.match(/^([A-G]#?)(\d)$/); const name = match[1]; const octave = Number(match[2]);
      const midi = 12 * (octave + 1) + SEMITONES[name]; return 440 * Math.pow(2, (midi - 69) / 12);
    }
    async function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state !== 'running') await audioCtx.resume(); unlockBtn.textContent = 'Audio Enabled';
    }
    unlockBtn.addEventListener('click', ensureAudio);
    function pluckVoice(freq, startTime, gainLevel, filterFreq, detuneCents = 0) {
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); const filter = audioCtx.createBiquadFilter();
      osc.type = 'sawtooth'; osc.frequency.value = freq; osc.detune.value = detuneCents; filter.type = 'lowpass'; filter.frequency.value = filterFreq;
      gain.gain.setValueAtTime(0.0001, startTime); gain.gain.exponentialRampToValueAtTime(gainLevel, startTime + 0.005); gain.gain.exponentialRampToValueAtTime(0.0001, startTime + 1.2);
      osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); osc.start(startTime); osc.stop(startTime + 1.25);
    }
    async function playNote(note) {
      await ensureAudio(); const freq = noteToFrequency(note); const now = audioCtx.currentTime; const mode = registrationEl.value;
      pluckVoice(freq, now, 0.16, 3200, 0); if (mode === 'double') pluckVoice(freq, now + 0.01, 0.10, 2800, 6); else if (mode === 'bright') pluckVoice(freq, now, 0.14, 5200, 0);
    }
    function makeKey(note, isBlack, leftPx = 0) {
      const el = document.createElement('div'); el.className = isBlack ? 'black-key' : 'white-key'; el.textContent = note; if (isBlack) el.style.left = `${leftPx}px`;
      const down = async (ev) => { ev.preventDefault(); el.classList.add('active'); try { await playNote(note); } catch (err) { console.error(err); } };
      const up = () => el.classList.remove('active');
      el.addEventListener('pointerdown', down); el.addEventListener('pointerup', up); el.addEventListener('pointercancel', up); el.addEventListener('pointerleave', up); return el;
    }
    function buildKeyboard() {
      const whiteKeyWidth = 64; let whiteIndex = 0;
      for (let octave = 3; octave <= 6; octave++) {
        for (const letter of WHITE_ORDER) {
          const whiteNote = `${letter}${octave}`; keyboard.appendChild(makeKey(whiteNote, false)); const currentWhiteIndex = whiteIndex; whiteIndex += 1;
          if (BLACK_AFTER[letter]) { const blackNote = `${BLACK_AFTER[letter]}${octave}`; const leftPx = currentWhiteIndex * whiteKeyWidth + (whiteKeyWidth - 20); keyboard.appendChild(makeKey(blackNote, true, leftPx)); }
        }
      }
    }
    buildKeyboard();
  </script>
</body>
</html>
