<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Virtual Harpsichord V5.1</title><style>body{margin:0;background:#1b110c;color:#f6efe6;font-family:system-ui}.wrap{padding:12px;max-width:1100px;margin:auto}.title{text-align:center;font-size:1.45rem;font-weight:700}.sub,.status,.legend{text-align:center;color:#d8c1a1;margin:6px 0}.panel{background:#342015;border:1px solid #6d4727;border-radius:12px;padding:10px;margin:10px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px}.lab{font-size:.78rem;color:#d8c1a1;margin-bottom:4px;display:block}button,select{width:100%;padding:9px;border-radius:9px;border:1px solid #6e4a27;background:#3b2417;color:#f6efe6}.active{outline:2px solid #b88a3b}.case{overflow:hidden;padding:12px;background:linear-gradient(#6a3f21,#321d12);border-top:6px solid #b88a3b;border-bottom:6px solid #b88a3b;border-radius:18px}.shell{overflow-x:auto}.keys{position:relative;display:flex;width:max-content;user-select:none;touch-action:pan-x}.wk{position:relative;width:42px;height:170px;background:linear-gradient(#fffaf2,#e8dcc9);border:1px solid #a68a68;border-bottom:9px solid #b59461;border-radius:0 0 9px 9px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;color:#51361d;font-size:.67rem}.wk.down{background:linear-gradient(#f5deb4,#dfc18d);transform:translateY(2px)}.bk{position:absolute;width:24px;height:98px;background:linear-gradient(#4f4035,#1f1714);border:1px solid #130d0b;border-radius:0 0 8px 8px;z-index:5;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;color:#f0e4d3;font-size:.58rem}.bk.down{background:linear-gradient(#8b6a43,#3a281d);transform:translateY(2px)}.warn{color:#ffce8a}.ok{color:#a7e0a1}</style></head><body><div class="wrap"><div class="title">Virtual Harpsichord V5.1</div><div class="sub">Sample-loading harpsichord with mapped fallback logic</div><div class="panel"><div class="grid"><div><span class="lab">Audio</span><button id="audioBtn">Enable Audio</button></div><div><span class="lab">Instrument</span><select id="instrument"></select></div><div><span class="lab">Registration</span><select id="reg"><option value="s8">Single 8'</option><option value="d8">Double 8'</option><option value="e4">8' + 4'</option></select></div><div><span class="lab">Sample mode</span><select id="mode"><option value="strict">Strict samples</option><option value="fallback">Pitch-shift fallback</option></select></div><div><span class="lab">Octave</span><div class="row2"><button id="octDown">-1</button><button id="octUp">+1</button></div></div></div><div class="status" id="status">Loading sample map…</div></div><div class="case"><div class="shell"><div id="keys" class="keys"></div></div></div><div class="legend">This version can use real files from <code>v5_1/assets/sounds/</code>. Without them, it will tell you which mapped file is missing.</div></div><script>const WHITE=['C','D','E','F','G','A','B'],BLACK_AFTER={C:'C#',D:'D#',F:'F#',G:'G#',A:'A#'},SEMI={C:0,'C#':1,D:2,'D#':3,E:4,F:5,'F#':6,G:7,'G#':8,A:9,'A#':10,B:11};let ctx=null,shift=0,mapData=null,buffers=new Map();const statusEl=document.getElementById('status'),instrumentEl=document.getElementById('instrument'),regEl=document.getElementById('reg'),modeEl=document.getElementById('mode'),keysEl=document.getElementById('keys');async function ensureAudio(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state!=='running')await ctx.resume();document.getElementById('audioBtn').textContent='Audio Enabled'}document.getElementById('audioBtn').onclick=ensureAudio;document.getElementById('octDown').onclick=()=>{shift--;renderStatus()};document.getElementById('octUp').onclick=()=>{shift++;renderStatus()};function parseNote(note){const m=note.match(/^([A-G]#?)(\d)$/);return{name:m[1],oct:Number(m[2])}}function midi(note){const p=parseNote(note);return 12*((p.oct+shift)+1)+SEMI[p.name]}function nearestMapped(set,note){const targets=Object.keys(set.notes);let best=targets[0],bestDist=Infinity;for(const t of targets){const d=Math.abs(midi(t)-midi(note));if(d<bestDist){best=t;bestDist=d}}return best}async function fetchBuffer(url){if(buffers.has(url))return buffers.get(url);const r=await fetch(url);if(!r.ok)throw new Error('Missing sample '+url);const b=await r.arrayBuffer();const decoded=await ctx.decodeAudioData(b);buffers.set(url,decoded);return decoded}async function playBuffer(buffer,playbackRate=1,gainValue=.95,when=0){const src=ctx.createBufferSource(),g=ctx.createGain();src.buffer=buffer;src.playbackRate.value=playbackRate;g.gain.value=gainValue;src.connect(g);g.connect(ctx.destination);src.start(ctx.currentTime+when)}async function playNote(note){await ensureAudio();const key=instrumentEl.value;const set=mapData.instrumentSets[key];let mapped=note,playbackRate=1;if(!set.notes[mapped]){if(modeEl.value==='strict'){statusEl.innerHTML='<span class="warn">No direct sample for '+note+' in '+set.displayName+'</span>';return}else{mapped=nearestMapped(set,note);playbackRate=Math.pow(2,(midi(note)-midi(mapped))/12)}}const url=set.baseUrl+set.notes[mapped];try{const buffer=await fetchBuffer(url);await playBuffer(buffer,playbackRate,.95,0);if(regEl.value==='d8')await playBuffer(buffer,playbackRate*1.003,.65,.01);if(regEl.value==='e4')await playBuffer(buffer,playbackRate*2,.38,.005);statusEl.innerHTML='<span class="ok">Played '+note+' using '+mapped+' → '+url+'</span>'}catch(err){statusEl.innerHTML='<span class="warn">'+err.message+'</span>'}}function makeKey(note,isBlack,left=0){const el=document.createElement('div');el.className=isBlack?'bk':'wk';el.textContent=note;if(isBlack)el.style.left=`${left}px`;const down=async e=>{e.preventDefault();el.classList.add('down');try{await playNote(note)}catch(err){console.error(err)}};const up=()=>el.classList.remove('down');el.addEventListener('pointerdown',down);el.addEventListener('pointerup',up);el.addEventListener('pointercancel',up);el.addEventListener('pointerleave',up);return el}function build(){let wi=0;for(let o=3;o<=6;o++){for(const l of WHITE){const wn=`${l}${o}`;keysEl.appendChild(makeKey(wn,false));const cur=wi;wi++;if(BLACK_AFTER[l])keysEl.appendChild(makeKey(`${BLACK_AFTER[l]}${o}`,true,cur*42+30))}}}function renderStatus(){statusEl.textContent='Instrument: '+instrumentEl.value+' | '+regEl.value+' | octave '+(shift>0?'+':'')+shift+' | '+modeEl.value}async function init(){const r=await fetch('./sample-map.json');mapData=await r.json();for(const [id,set] of Object.entries(mapData.instrumentSets)){const opt=document.createElement('option');opt.value=id;opt.textContent=set.displayName;instrumentEl.appendChild(opt)}instrumentEl.onchange=renderStatus;regEl.onchange=renderStatus;modeEl.onchange=renderStatus;build();renderStatus()}init().catch(err=>{statusEl.innerHTML='<span class="warn">Failed to load sample map: '+err.message+'</span>'});</script></body></html>
